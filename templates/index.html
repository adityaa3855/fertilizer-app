<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fertilizer Recommendation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <h1>Fertilizer Recommendation</h1>
    <p>Enter your field parameters to get the best fertilizer suggestion.</p>
  </header>

  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}
  {% if result %}
    <div class="alert alert-success">
      <strong>Recommended Fertilizer:</strong> {{ result }}{% if confidence %} &nbsp; 
      <span class="chip">Confidence: {{ confidence }}%</span>{% endif %}
    </div>
  {% endif %}

  <main class="card">
    <form action="/predict" method="post" class="grid">
      <div class="form-group">
        <label>Temperature (°C) <small>(0–60)</small></label>
        <input type="number" step="0.1" name="temperature" min="0" max="60" required>
      </div>
      <div class="form-group">
        <label>Humidity (%) <small>(0–100)</small></label>
        <input type="number" step="0.1" name="humidity" min="0" max="100" required>
      </div>
      <div class="form-group">
        <label>Moisture (%) <small>(0–100)</small></label>
        <input type="number" step="0.1" name="moisture" min="0" max="100" required>
      </div>
      <div class="form-group">
        <label>Nitrogen (N) <small>(0–140)</small></label>
        <input type="number" step="1" name="nitrogen" min="0" max="140" required>
      </div>
      <div class="form-group">
        <label>Potassium (K) <small>(0–140)</small></label>
        <input type="number" step="1" name="potassium" min="0" max="140" required>
      </div>
      <div class="form-group">
        <label>Phosphorous (P) <small>(0–140)</small></label>
        <input type="number" step="1" name="phosphorous" min="0" max="140" required>
      </div>

      <div class="form-group">
        <label>Soil Type</label>
        <select name="soil_type" required>
          <option value="" disabled selected>Select soil</option>
          {% for s in soils %}
            <option value="{{ s }}">{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Crop Type</label>
        <select name="crop_type" required>
          <option value="" disabled selected>Select crop</option>
          {% for c in crops %}
            <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="actions">
        <button type="submit">Get Recommendation</button>
      </div>
    </form>
  </main>

  <footer>
    <p>AGRISens • Fertilizer Advisor</p>
  </footer>
</body>
</html>
